<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MGK Class 5 Universal Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6; --neon: #00f2fe; --border: rgba(255, 255, 255, 0.1);
            --basic: #00e676; --medium: #ff9100; --adv: #ff1744;
        }

        body {
            margin: 0; font-family: 'Outfit', sans-serif; background: #020617; color: #fff;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(139, 92, 246, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(0, 242, 254, 0.08) 0%, transparent 40%);
            background-attachment: fixed; min-height: 100vh;
        }

        header {
            position: sticky; top: 0; z-index: 2000; background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 15px; text-align: center;
        }

        /* Medium Switcher Style */
        .med-toggle { display: flex; justify-content: center; gap: 5px; margin-bottom: 15px; background: rgba(255,255,255,0.05); width: fit-content; margin: 0 auto 15px; padding: 5px; border-radius: 50px; border: 1px solid var(--border); }
        .med-btn { padding: 6px 15px; border-radius: 50px; border: none; background: transparent; color: #94a3b8; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 11px; }
        .med-btn.active { background: var(--primary); color: white; }

        .logo { font-size: 1.8rem; font-weight: 900; background: linear-gradient(to right, #fff, var(--primary), var(--neon)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 15px; letter-spacing: -1px; }

        .search-box { width: 90%; max-width: 500px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 12px 20px; border-radius: 50px; color: #fff; outline: none; margin-bottom: 15px; }

        .sub-nav { display: flex; overflow-x: auto; gap: 10px; padding: 5px 10px; scrollbar-width: none; justify-content: center; }
        .sub-nav::-webkit-scrollbar { display: none; }

        .btn-sub { flex: 0 0 auto; padding: 10px 25px; border-radius: 50px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #94a3b8; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-sub.active { background: #fff; color: #000; box-shadow: 0 10px 25px rgba(255,255,255,0.2); }

        .portal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 25px; padding: 25px; max-width: 1500px; margin: auto; }

        .card { background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 35px; padding: 25px; display: none; transition: 0.4s; border-top: 2px solid var(--primary); }
        .card.active { display: block; animation: fadeInUp 0.5s ease; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .lvl-tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; background: rgba(0,0,0,0.4); padding: 5px; border-radius: 20px; margin: 20px 0; }
        .lvl-btn { border: none; background: transparent; color: #64748b; padding: 12px; border-radius: 16px; font-weight: 900; font-size: 11px; cursor: pointer; }
        .lvl-btn.b-on { background: var(--basic); color: #000; }
        .lvl-btn.m-on { background: var(--medium); color: #000; }
        .lvl-btn.a-on { background: var(--adv); color: #fff; }

        .vault { background: rgba(0,0,0,0.25); border-radius: 25px; padding: 12px; max-height: 350px; overflow-y: auto; }
        .pdf-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 15px 20px; border-radius: 20px; margin-bottom: 10px; text-decoration: none; color: #cbd5e1; font-size: 14px; font-weight: 600; border: 1px solid transparent; }
        .pdf-item:hover { background: rgba(255,255,255,0.08); border-color: var(--primary); color: #fff; }
        .pdf-item i { color: var(--neon); font-style: normal; font-weight: 900; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="med-toggle">
            <button class="med-btn active" id="enBtn" onclick="toggleMed('en')">English</button>
            <button class="med-btn" id="hiBtn" onclick="toggleMed('hi')">हिंदी</button>
        </div>

        <div class="logo">MGK CLASS 5 HUB</div>
        <input type="text" class="search-box" id="search" placeholder="Search Chapter Name..." onkeyup="filter()">
        <div class="sub-nav" id="subTabs">
            </div>
    </header>

    <div class="portal-grid" id="mainGrid"></div>

    <script>
        let currentMedium = 'en';
        let activeSubject = 'Maths';

        const UI_TEXT = {
            en: { search: "Search Chapter Name...", subjects: ["Maths", "EVS", "English", "Hindi"] },
            hi: { search: "पाठ का नाम खोजें...", subjects: ["गणित", "पर्यावरण", "अंग्रेजी", "हिंदी"] }
        };

        const DB = {
            "Maths": [
                { en: "The Fish Tale", hi: "मछली उछली", links: ["#", "#", "#"] },
                { en: "Shapes and Angles", hi: "आकृतियाँ और कोण", links: ["#", "#", "#"] },
                { en: "How Many Squares?", hi: "कितने वर्ग?", links: ["#", "#", "#"] },
                { en: "Parts and Wholes", hi: "हिस्से और पूरे", links: ["#", "#", "#"] },
                { en: "Does it Look Same?", hi: "क्या यह एक जैसा दिखता है?", links: ["#", "#", "#"] },
                { en: "Be My Multiple", hi: "मैं तेरा गुणनखंड, तू मेरा गुणज", links: ["#", "#", "#"] },
                { en: "Can You See Pattern?", hi: "क्या तुम पैटर्न देख सकते हो?", links: ["#", "#", "#"] },
                { en: "Mapping Your Way", hi: "नक्शा", links: ["#", "#", "#"] },
                { en: "Boxes and Sketches", hi: "डिब्बे और स्केच", links: ["#", "#", "#"] },
                { en: "Tenths and Hundredths", hi: "दसवाँ और सौवाँ भाग", links: ["#", "#", "#"] },
                { en: "Area and Boundary", ["hi"]: "क्षेत्रफल और घेरा", links: ["#", "#", "#"] },
                { en: "Smart Charts", hi: "स्मार्ट चार्ट", links: ["#", "#", "#"] },
                { en: "Ways to Multiply", hi: "गुणा और भाग के तरीके", links: ["#", "#", "#"] },
                { en: "How Big? How Heavy?", hi: "कितना बड़ा? कितना भारी?", links: ["#", "#", "#"] }
            ],
            "EVS": [
                { en: "Super Senses", hi: "कैसे पहचाना चींटी ने दोस्त को?", links: ["#", "#", "#"] },
                { en: "Snake Charmer Story", hi: "कहानी सपेरों की", links: ["#", "#", "#"] },
                { en: "Tasting to Digesting", hi: "चखने से पचने तक", links: ["#", "#", "#"] },
                { en: "Mangoes Year Round", hi: "खाएँ आम बारहों महीने", links: ["#", "#", "#"] },
                { en: "Seeds and Seeds", hi: "बीज, बीज, बीज", links: ["#", "#", "#"] },
                { en: "Every Drop Counts", hi: "बूँद-बूँद, दरिया-दरिया", links: ["#", "#", "#"] },
                { en: "Experiments with Water", hi: "पानी के प्रयोग", links: ["#", "#", "#"] },
                { en: "A Treat for Mosquitoes", hi: "मच्छरों की दावत", links: ["#", "#", "#"] },
                { en: "Up You Go!", hi: "डायरी: कमर सीधी, ऊपर चढ़ो!", links: ["#", "#", "#"] },
                { en: "Walls Tell Stories", hi: "बोलती इमारतें", links: ["#", "#", "#"] },
                { en: "Sunita in Space", hi: "सुनीता अंतरिक्ष में", links: ["#", "#", "#"] },
                { en: "What if it Finishes?", hi: "खत्म हो जाए तो...?", links: ["#", "#", "#"] },
                { en: "A Shelter so High!", hi: "बसेरा ऊँचाई पर", links: ["#", "#", "#"] },
                { en: "When Earth Shook", hi: "जब धरती काँपी", links: ["#", "#", "#"] },
                { en: "Blow Hot, Blow Cold", hi: "उसी से ठंडा, उसी से गर्म", links: ["#", "#", "#"] }
            ],
            "English": [
                { en: "Ice-cream Man", hi: "आइसक्रीम मैन", links: ["#", "#", "#"] },
                { en: "Wonderful Waste", hi: "वंडरफुल वेस्ट", links: ["#", "#", "#"] },
                { en: "Flying Together", hi: "फ्लाइंग टुगेदर", links: ["#", "#", "#"] },
                { en: "Teamwork", hi: "टीमवर्क", links: ["#", "#", "#"] },
                { en: "My Shadow", hi: "माई शैडो", links: ["#", "#", "#"] },
                { en: "Robinson Crusoe", hi: "रॉबिन्सन क्रूसो", links: ["#", "#", "#"] },
                { en: "Crying", hi: "क्राइंग", links: ["#", "#", "#"] },
                { en: "My Elder Brother", hi: "बड़े भाई साहब", links: ["#", "#", "#"] },
                { en: "The Talkative Barber", hi: "बातूनी नाई", links: ["#", "#", "#"] }
            ],
            "Hindi": [
                { en: "Raakh ki Rassi", hi: "राख की रस्सी", links: ["#", "#", "#"] },
                { en: "Faslo ke Tyohar", hi: "फसलों के त्योहार", links: ["#", "#", "#"] },
                { en: "Khilaunewala", hi: "खिलौनेवाला", links: ["#", "#", "#"] },
                { en: "Nanha Fankar", hi: "नन्हा फनकार", links: ["#", "#", "#"] },
                { en: "Chitthi ka Safar", hi: "चिट्ठी का सफर", links: ["#", "#", "#"] },
                { en: "Dakiyaki Kahani", hi: "डाकिए की कहानी", links: ["#", "#", "#"] }
            ]
        };

        function toggleMed(med) {
            currentMedium = med;
            document.getElementById('enBtn').classList.toggle('active', med === 'en');
            document.getElementById('hiBtn').classList.toggle('active', med === 'hi');
            document.getElementById('search').placeholder = UI_TEXT[med].search;
            init();
        }

        function init() {
            const grid = document.getElementById('mainGrid');
            const subTabs = document.getElementById('subTabs');
            grid.innerHTML = '';
            subTabs.innerHTML = '';
            
            const rawSubs = ["Maths", "EVS", "English", "Hindi"];
            const displaySubs = UI_TEXT[currentMedium].subjects;

            rawSubs.forEach((sub, index) => {
                const btn = document.createElement('button');
                btn.className = `btn-sub ${sub === activeSubject ? 'active' : ''}`;
                btn.innerText = displaySubs[index];
                btn.onclick = (e) => switchS(sub, e.target);
                subTabs.appendChild(btn);
            });

            Object.keys(DB).forEach(sub => {
                DB[sub].forEach((chData, i) => {
                    const chapter = chData[currentMedium];
                    const links = chData.links;
                    const id = `${sub.substring(0,2)}-${i}`;
                    
                    const card = document.createElement('div');
                    card.className = `card ${sub}-key hub-card`;
                    if(sub === activeSubject) card.classList.add('active');

                    card.innerHTML = `
                        <h3 style="margin:0; font-size:1.2rem;">${chapter}</h3>
                        <div class="lvl-tabs">
                            <button class="lvl-btn b-on" onclick="setV('${id}', '${links[0]}', this, 'Basic')">BASIC</button>
                            <button class="lvl-btn" onclick="setV('${id}', '${links[1]}', this, 'MEDIUM')">MEDIUM</button>
                            <button class="lvl-btn" onclick="setV('${id}', '${links[2]}', this, 'ADVANCED')">ADVANCED</button>
                        </div>
                        <div class="vault" id="v-${id}">
                            ${gen(links[0], 'Basic')}
                        </div>
                    `;
                    grid.appendChild(card);
                });
            });
        }

        function gen(url, lvl) {
            let h = '';
            for(let i=1; i<=26; i++) {
                h += `<a href="${url}" target="_blank" class="pdf-item">
                        <span>📄 ${lvl} Content ${i}</span>
                        <i>GO →</i>
                      </a>`;
            }
            return h;
        }

        function setV(id, url, btn, lvl) {
            const row = btn.parentElement.querySelectorAll('.lvl-btn');
            row.forEach(b => b.className = 'lvl-btn');
            if(lvl === 'Basic') btn.classList.add('b-on');
            else if(lvl === 'MEDIUM') btn.classList.add('m-on');
            else btn.classList.add('a-on');
            document.getElementById(`v-${id}`).innerHTML = gen(url, lvl);
        }

        function switchS(s, btn) {
            activeSubject = s;
            document.querySelectorAll('.btn-sub').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.card').forEach(c => {
                c.classList.remove('active');
                if(c.classList.contains(s + '-key')) c.classList.add('active');
            });
            window.scrollTo({top:0, behavior:'smooth'});
        }

        function filter() {
            let v = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.hub-card').forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(v) ? "block" : "none";
                if(v!=="") c.classList.add('active');
            });
        }

        init();
    </script>
</body>
</html>
