<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 5 Portal - MGK Study Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #fff5f8 url('https://www.transparenttextures.com/patterns/floral-paper.png'); color: #333; }
        header { background: #d81b60; color: white; padding: 25px; text-align: center; font-weight: 800; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 15px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .section-card { background: white; border-radius: 20px; border: 2px solid #fce4ec; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        .section-card:hover { transform: translateY(-5px); border-color: #f06292; }
        .section-card h3 { color: #d81b60; margin-top: 0; border-bottom: 2px solid #fce4ec; padding-bottom: 10px; font-size: 18px; text-transform: uppercase; }
        .link-list { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .res-link { text-decoration: none; color: #444; background: #fffafa; padding: 12px; border-radius: 10px; border: 1px solid #f8bbd0; font-weight: 600; font-size: 14px; transition: 0.2s; text-align: center; }
        .res-link:hover { background: #d81b60; color: white; }
        .nav-btns { text-align: center; margin: 20px; }
        .back-home { display: inline-block; padding: 10px 20px; background: #333; color: white; text-decoration: none; border-radius: 50px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>Class 5 Resource Portal 🎒</h1>
    </header>

    <div class="nav-btns">
        <a href="index.html" class="back-home">🏠 Back to Home</a>
    </div>

    <div class="container" id="contentContainer">
        </div>

<script>
    // 📝 SUBJECT-WISE CONTENT DATA
    const resourceData = [
        {
          category: "🔢 Mathematics (Ganit)",
          links: [
            { title: "NCERT Math-Magic Book PDF", url: "#" },
            { title: "Maths Chapter-wise Notes", url: "#" },
            { title: "Tables (1-20) Chart", url: "#" }
          ]
        },
        {
          category: "🌿 EVS (Environmental Studies)",
          links: [
            { title: "Looking Around (NCERT Book)", url: "#" },
            { title: "EVS Short Revision Notes", url: "#" },
            { title: "Science Activity Book", url: "#" }
          ]
        },
        {
          category: "📖 Language (English & Hindi)",
          links: [
            { title: "English: Marigold Book PDF", url: "#" },
            { title: "Hindi: Rimjhim Book PDF", url: "#" },
            { title: "Basic Grammar Guide", url: "#" }
          ]
        },
        {
          category: "📝 Exam & Practice",
          links: [
            { title: "Sample Question Papers", url: "#" },
            { title: "Previous Year Papers", url: "#" },
            { title: "Weekly Revision Quiz", url: "#" }
          ]
        }
    ];

    // Rendering Logic
    const container = document.getElementById('contentContainer');
    resourceData.forEach(section => {
        let linksHTML = section.links.map(l => `<a href="${l.url}" class="res-link" target="_blank">${l.title}</a>`).join('');
        container.innerHTML += `
            <div class="section-card">
                <h3>${section.category}</h3>
                <div class="link-list">${linksHTML}</div>
            </div>`;
    });
</script>

</body>
</html>
