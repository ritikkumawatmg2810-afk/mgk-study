<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MGK Class 5 Universal Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6; --neon: #00f2fe; --border: rgba(255, 255, 255, 0.1);
            --basic: #00e676; --medium: #ff9100; --adv: #ff1744;
        }

        body {
            margin: 0; font-family: 'Outfit', sans-serif; background: #020617; color: #fff;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(139, 92, 246, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(0, 242, 254, 0.08) 0%, transparent 40%);
            background-attachment: fixed; min-height: 100vh;
        }

        header {
            position: sticky; top: 0; z-index: 2000; background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 15px; text-align: center;
        }

        .logo { font-size: 1.8rem; font-weight: 900; background: linear-gradient(to right, #fff, var(--primary), var(--neon)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 15px; letter-spacing: -1px; }

        .search-box { width: 90%; max-width: 500px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 12px 20px; border-radius: 50px; color: #fff; outline: none; margin-bottom: 15px; }

        .sub-nav { display: flex; overflow-x: auto; gap: 10px; padding: 5px 10px; scrollbar-width: none; justify-content: center; }
        .sub-nav::-webkit-scrollbar { display: none; }

        .btn-sub { flex: 0 0 auto; padding: 10px 25px; border-radius: 50px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #94a3b8; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-sub.active { background: #fff; color: #000; box-shadow: 0 10px 25px rgba(255,255,255,0.2); }

        .portal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 25px; padding: 25px; max-width: 1500px; margin: auto; }

        .card { background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 35px; padding: 25px; display: none; transition: 0.4s; border-top: 2px solid var(--primary); }
        .card.active { display: block; animation: fadeInUp 0.5s ease; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .lvl-tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; background: rgba(0,0,0,0.4); padding: 5px; border-radius: 20px; margin: 20px 0; }
        .lvl-btn { border: none; background: transparent; color: #64748b; padding: 12px; border-radius: 16px; font-weight: 900; font-size: 11px; cursor: pointer; }
        .lvl-btn.b-on { background: var(--basic); color: #000; }
        .lvl-btn.m-on { background: var(--medium); color: #000; }
        .lvl-btn.a-on { background: var(--adv); color: #fff; }

        .vault { background: rgba(0,0,0,0.25); border-radius: 25px; padding: 12px; max-height: 350px; overflow-y: auto; }
        .pdf-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 15px 20px; border-radius: 20px; margin-bottom: 10px; text-decoration: none; color: #cbd5e1; font-size: 14px; font-weight: 600; border: 1px solid transparent; }
        .pdf-item:hover { background: rgba(255,255,255,0.08); border-color: var(--primary); color: #fff; }
        .pdf-item i { color: var(--neon); font-style: normal; font-weight: 900; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">MGK CLASS 5 HUB</div>
        <input type="text" class="search-box" id="search" placeholder="Search Chapter Name..." onkeyup="filter()">
        <div class="sub-nav">
            <button class="btn-sub active" onclick="switchS('Maths', this)">Maths</button>
            <button class="btn-sub" onclick="switchS('EVS', this)">EVS</button>
            <button class="btn-sub" onclick="switchS('English', this)">English</button>
            <button class="btn-sub" onclick="switchS('Hindi', this)">Hindi</button>
        </div>
    </header>

    <div class="portal-grid" id="mainGrid"></div>

    <script>
        /* =========================================================
           MASTER CONTENT DATABASE 
           [ "Chapter Name", ["Basic Link", "Medium Link", "Adv Link"] ]
           =========================================================
        */
        const DB = {
            "Maths": [
                ["The Fish Tale", ["#", "#", "#"]],
                ["Shapes and Angles", ["#", "#", "#"]],
                ["How Many Squares?", ["#", "#", "#"]],
                ["Parts and Wholes", ["#", "#", "#"]],
                ["Does it Look Same?", ["#", "#", "#"]],
                ["Be My Multiple", ["#", "#", "#"]],
                ["Can You See Pattern?", ["#", "#", "#"]],
                ["Mapping Your Way", ["#", "#", "#"]],
                ["Boxes and Sketches", ["#", "#", "#"]],
                ["Tenths and Hundredths", ["#", "#", "#"]],
                ["Area and Boundary", ["#", "#", "#"]],
                ["Smart Charts", ["#", "#", "#"]],
                ["Ways to Multiply", ["#", "#", "#"]],
                ["How Big? How Heavy?", ["#", "#", "#"]]
            ],
            "EVS": [
                ["Super Senses", ["#", "#", "#"]],
                ["Snake Charmer Story", ["#", "#", "#"]],
                ["Tasting to Digesting", ["#", "#", "#"]],
                ["Mangoes Year Round", ["#", "#", "#"]],
                ["Seeds and Seeds", ["#", "#", "#"]],
                ["Every Drop Counts", ["#", "#", "#"]],
                ["Experiments with Water", ["#", "#", "#"]],
                ["A Treat for Mosquitoes", ["#", "#", "#"]],
                ["Up You Go!", ["#", "#", "#"]],
                ["Walls Tell Stories", ["#", "#", "#"]],
                ["Sunita in Space", ["#", "#", "#"]],
                ["What if it Finishes?", ["#", "#", "#"]],
                ["A Shelter so High!", ["#", "#", "#"]],
                ["When Earth Shook", ["#", "#", "#"]],
                ["Blow Hot, Blow Cold", ["#", "#", "#"]]
            ],
            "English": [
                ["Ice-cream Man", ["#", "#", "#"]],
                ["Wonderful Waste", ["#", "#", "#"]],
                ["Flying Together", ["#", "#", "#"]],
                ["Teamwork", ["#", "#", "#"]],
                ["My Shadow", ["#", "#", "#"]],
                ["Robinson Crusoe", ["#", "#", "#"]],
                ["Crying", ["#", "#", "#"]],
                ["My Elder Brother", ["#", "#", "#"]],
                ["The Talkative Barber", ["#", "#", "#"]]
            ],
            "Hindi": [
                ["Raakh ki Rassi", ["#", "#", "#"]],
                ["Faslo ke Tyohar", ["#", "#", "#"]],
                ["Khilaunewala", ["#", "#", "#"]],
                ["Nanha Fankar", ["#", "#", "#"]],
                ["Chitthi ka Safar", ["#", "#", "#"]],
                ["Dakiyaki Kahani", ["#", "#", "#"]]
            ]
        };

        function init() {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            
            Object.keys(DB).forEach(sub => {
                DB[sub].forEach((chData, i) => {
                    const chapter = chData[0];
                    const links = chData[1];
                    const id = `${sub.substring(0,2)}-${i}`;
                    
                    const card = document.createElement('div');
                    card.className = `card ${sub}-key hub-card`;
                    if(sub === 'Maths') card.classList.add('active');

                    card.innerHTML = `
                        <h3 style="margin:0; font-size:1.2rem;">${chapter}</h3>
                        <div class="lvl-tabs">
                            <button class="lvl-btn b-on" onclick="setV('${id}', '${links[0]}', this, 'Basic')">BASIC</button>
                            <button class="lvl-btn" onclick="setV('${id}', '${links[1]}', this, 'MEDIUM')">MEDIUM</button>
                            <button class="lvl-btn" onclick="setV('${id}', '${links[2]}', this, 'ADVANCED')">ADVANCED</button>
                        </div>
                        <div class="vault" id="v-${id}">
                            ${gen(links[0], 'Basic')}
                        </div>
                    `;
                    grid.appendChild(card);
                });
            });
        }

        function gen(url, lvl) {
            let h = '';
            for(let i=1; i<=26; i++) {
                h += `<a href="${url}" target="_blank" class="pdf-item">
                        <span>📄 ${lvl} Content ${i}</span>
                        <i>GO →</i>
                      </a>`;
            }
            return h;
        }

        function setV(id, url, btn, lvl) {
            const row = btn.parentElement.querySelectorAll('.lvl-btn');
            row.forEach(b => b.className = 'lvl-btn');
            if(lvl === 'Basic') btn.classList.add('b-on');
            else if(lvl === 'MEDIUM') btn.classList.add('m-on');
            else btn.classList.add('a-on');
            document.getElementById(`v-${id}`).innerHTML = gen(url, lvl);
        }

        function switchS(s, btn) {
            document.querySelectorAll('.btn-sub').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.card').forEach(c => {
                c.classList.remove('active');
                if(c.classList.contains(s + '-key')) c.classList.add('active');
            });
            window.scrollTo({top:0, behavior:'smooth'});
        }

        function filter() {
            let v = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.hub-card').forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(v) ? "block" : "none";
                if(v!=="") c.classList.add('active');
            });
        }

        init();
    </script>
</body>
</html>
