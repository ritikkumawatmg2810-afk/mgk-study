<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MGK JEE Study Hub | Path to IIT</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI'; }
body { background-color: #f4f7f6; color: #333; }

/* HEADER */
header {
  background: #003366;
  color: white;
  padding: 1rem 5%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
}

/* NAV */
nav a {
  color: white;
  text-decoration: none;
  margin-left: 20px;
  font-weight: bold;
}

/* HERO */
.hero {
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
  url('https://images.unsplash.com/photo-1434030216411-0b793f4b4173?auto=format&fit=crop&w=1350&q=80');
  height: 80vh;
  background-size: cover;
  background-position: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
  padding: 20px;
}

.hero h1 { font-size: 3rem; }

/* BUTTON */
.btn {
  background: #ff6600;
  color: white;
  padding: 12px 30px;
  text-decoration: none;
  border-radius: 5px;
  margin-top: 20px;
  display:inline-block;
}

/* FEATURES */
.features {
  display: flex;
  justify-content: space-around;
  padding: 40px 5%;
  background: white;
  flex-wrap: wrap;
}

.feature-card {
  width: 280px;
  padding: 20px;
  margin: 10px;
  text-align: center;
  border-radius: 10px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.feature-card:hover {
  transform: scale(1.05);
}

/* SEARCH */
.search-box {
  text-align:center;
  margin:20px;
}

input {
  padding:10px;
  width:80%;
  max-width:400px;
}

/* FOOTER */
footer {
  background:#222;
  color:white;
  text-align:center;
  padding:20px;
}

/* MOBILE FIX */
@media (max-width:768px){
  .hero h1 { font-size:22px; }
  .features { flex-direction:column; align-items:center; }
}
</style>
</head>

<body>

<header>
  <h2>MGK JEE Study Hub</h2>
  <nav>
    <a href="index.html">Home</a>
    <a href="physics.html">Notes</a>
    <a href="test.html">Test</a>
    <a href="leaderboard.html">Leaderboard</a>
  </nav>
</header>

<section class="hero">
  <h1>Master the JEE with MGK 🚀</h1>
  <p>Free Notes | Tests | AI Doubt Solver</p>
  <a href="test.html" class="btn">🔥 Start Test</a>
</section>

<!-- SEARCH -->
<div class="search-box">
  <input type="text" id="search" placeholder="Search Chapter...">
</div>

<section class="features">

<a href="physics.html">
  <div class="feature-card">📘 Physics Notes</div>
</a>

<a href="chemistry.html">
  <div class="feature-card">🧪 Chemistry Notes</div>
</a>

<a href="maths.html">
  <div class="feature-card">📗 Maths Notes</div>
</a>

<a href="test.html">
  <div class="feature-card">📝 Mock Tests</div>
</a>

<a href="leaderboard.html">
  <div class="feature-card">🏆 Leaderboard</div>
</a>

<a href="#">
  <div class="feature-card">🤖 AI Doubt Solver</div>
</a>

</section>

<!-- LIKE BUTTON -->
<div style="text-align:center;">
<button onclick="like()">👍 Like (<span id="likes">0</span>)</button>
</div>

<footer>
  <p>© 2026 MGK JEE Study Hub 🚀</p>
</footer>

<script>
// LIKE
let count=0;
function like(){
  count++;
  document.getElementById("likes").innerText=count;
}

// SEARCH
document.getElementById("search").addEventListener("keyup", function(){
let val=this.value.toLowerCase();
let cards=document.querySelectorAll(".feature-card");

cards.forEach(card=>{
card.parentElement.style.display =
card.innerText.toLowerCase().includes(val) ? "block":"none";
});
});
</script>

</body>
</html>
