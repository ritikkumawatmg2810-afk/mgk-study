<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MGK JEE Study Hub | Path to IIT</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI'; }
body { background-color: #f4f7f6; color: #333; }

/* HEADER */
header {
  background: #003366;
  color: white;
  padding: 1rem 5%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
}

/* NAV */
nav a {
  color: white;
  text-decoration: none;
  margin-left: 20px;
  font-weight: bold;
}

/* HERO */
.hero {
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
  url('https://images.unsplash.com/photo-1434030216411-0b793f4b4173?auto=format&fit=crop&w=1350&q=80');
  height: 60vh;
  background-size: cover;
  background-position: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
  padding: 20px;
}

.hero h1 { font-size: 3rem; }

/* BUTTON */
.btn {
  background: #ff6600;
  color: white;
  padding: 12px 30px;
  text-decoration: none;
  border-radius: 5px;
  margin-top: 20px;
  display:inline-block;
  cursor: pointer;
  border: none;
}

/* FEATURES */
.features {
  display: flex;
  justify-content: space-around;
  padding: 40px 5%;
  background: white;
  flex-wrap: wrap;
}

.feature-card {
  width: 280px;
  padding: 20px;
  margin: 10px;
  text-align: center;
  border-radius: 10px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  transition: 0.3s;
  background: #fff;
  color: #333;
}

.feature-card:hover {
  transform: scale(1.05);
  background: #f0f7ff;
}

/* --- MOCK TEST SYSTEM OVERLAY --- */
#testPortal {
  display: none;
  position: fixed;
  inset: 0;
  background: #fff;
  z-index: 1000;
  overflow-y: auto;
}

.portal-header {
  background: #003366;
  color: white;
  padding: 15px 5%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
}

.tab-container {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 20px;
  background: #eee;
}

.tab-btn {
  padding: 10px 25px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-weight: bold;
  background: #ddd;
}

.tab-btn.active {
  background: #ff6600;
  color: white;
}

.test-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 15px;
  padding: 20px 5%;
}

.year-card {
  background: #f9f9f9;
  border: 1px solid #ddd;
  padding: 20px;
  text-align: center;
  border-radius: 8px;
  transition: 0.3s;
}

.year-card:hover { border-color: #ff6600; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
.year-card h3 { font-size: 20px; margin-bottom: 10px; }

.start-btn {
  background: #003366;
  color: white;
  border: none;
  padding: 5px 15px;
  border-radius: 4px;
  font-size: 12px;
  text-decoration: none;
  display:inline-block;
}

/* SEARCH */
.search-box { text-align:center; margin:20px; }
input { padding:10px; width:80%; max-width:400px; border: 1px solid #ddd; border-radius: 5px;}

footer { background:#222; color:white; text-align:center; padding:20px; }

@media (max-width:768px){
  .hero h1 { font-size:22px; }
  .features { flex-direction:column; align-items:center; }
}
</style>
</head>

<body>

<header>
  <h2>MGK JEE Study Hub</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#" onclick="openPortal()">Mock Test</a>
    <a href="leaderboard.html">Leaderboard</a>
  </nav>
</header>

<section class="hero">
  <h1>Master the JEE with MGK 🚀</h1>
  <p>Free Notes | Tests | AI Doubt Solver</p>
  <button onclick="openPortal()" class="btn">🔥 Start Test</button>
</section>

<div class="search-box">
  <input type="text" id="search" placeholder="Search Chapter...">
</div>

<section class="features">

<a href="physics.html">
  <div class="feature-card">📘 Physics Notes</div>
</a>

<a href="chemistry.html">
  <div class="feature-card">🧪 Chemistry Notes</div>
</a>

<a href="maths.html">
  <div class="feature-card">📗 Maths Notes</div>
</a>

<div class="feature-card" onclick="openPortal()" style="cursor:pointer; border: 2px solid #ff6600;">
📝 Mock Tests
</div>

<a href="leaderboard.html">
  <div class="feature-card">🏆 Leaderboard</div>
</a>

<div class="feature-card">🤖 AI Doubt Solver</div>

</section>

<div id="testPortal">
  <div class="portal-header">
    <h2>JEE TEST PORTAL</h2>
    <button onclick="closePortal()" style="background:none; border:none; color:white; font-size:30px;">&times;</button>
  </div>

  <div class="tab-container">
    <button id="mainsBtn" class="tab-btn active" onclick="showType('mains')">JEE MAINS</button>
    <button id="advBtn" class="tab-btn" onclick="showType('adv')">JEE ADVANCED</button>
  </div>

  <div id="mainsSection" class="test-grid"></div>
  <div id="advSection" class="test-grid" style="display:none;"></div>
</div>

<footer>
  <p>© 2026 MGK JEE Study Hub 🚀</p>
</footer>

<script>
const mainsBox = document.getElementById('mainsSection');
const advBox = document.getElementById('advSection');

function loadTests() {
  for(let y=2026; y>=2015; y--) {

    let mainsLink = "#";
    let text = "COMING SOON";

    if(y == 2024){
      mainsLink = "https://docs.google.com/forms/d/e/1FAIpQLSdhy3vlUzFU8MdchRVvPTIUXaijGUpUTinw37_DTkOTgJ2aGA/viewform";
      text = "START TEST";
    }

    mainsBox.innerHTML += `
      <div class="year-card">
        <p style="font-size:10px; color:orange; font-weight:bold;">MAINS</p>
        <h3>${y}</h3>
        <a href="${mainsLink}" target="_blank" class="start-btn">${text}</a>
      </div>`;

    advBox.innerHTML += `
      <div class="year-card">
        <p style="font-size:10px; color:red; font-weight:bold;">ADVANCED</p>
        <h3>${y}</h3>
        <a href="#" class="start-btn">COMING SOON</a>
      </div>`;
  }
}
loadTests();

function openPortal() { document.getElementById('testPortal').style.display = 'block'; }
function closePortal() { document.getElementById('testPortal').style.display = 'none'; }

function showType(type) {
  if(type === 'mains') {
    mainsBox.style.display = 'grid';
    advBox.style.display = 'none';
    mainsBtn.classList.add('active');
    advBtn.classList.remove('active');
  } else {
    mainsBox.style.display = 'none';
    advBox.style.display = 'grid';
    advBtn.classList.add('active');
    mainsBtn.classList.remove('active');
  }
}

document.getElementById("search").addEventListener("keyup", function(){
  let val=this.value.toLowerCase();
  let cards=document.querySelectorAll(".feature-card");
  cards.forEach(card=>{
    card.style.display = card.innerText.toLowerCase().includes(val) ? "block":"none";
  });
});
</script>

</body>
</html>
