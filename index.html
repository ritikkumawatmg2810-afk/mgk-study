<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MGK JEE Study Hub</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI';}
body{background:#f4f7f6}

/* HEADER */
header{
background:#003366;
color:white;
padding:1rem 5%;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:100;
}

/* NAV */
nav a{
color:white;
margin-left:15px;
text-decoration:none;
font-weight:bold;
}

/* HERO */
.hero{
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url('https://images.unsplash.com/photo-1434030216411-0b793f4b4173?auto=format&fit=crop&w=1350&q=80');
height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

.hero h1{font-size:2.5rem}

/* BUTTON */
.btn{
background:#ff6600;
color:white;
padding:10px 25px;
border-radius:5px;
margin-top:15px;
display:inline-block;
}

/* SEARCH */
.search-box{text-align:center;margin:20px}
input{padding:10px;width:80%;max-width:400px}

/* FEATURES */
.features{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:20px;
}

.feature-card{
background:white;
padding:20px;
text-align:center;
border-radius:10px;
box-shadow:0 4px 8px rgba(0,0,0,0.1);
transition:0.3s;
}

.feature-card:hover{transform:scale(1.05)}

/* TEST PORTAL */
#testPortal{
display:none;
position:fixed;
inset:0;
background:white;
z-index:1000;
overflow:auto;
}

.portal-header{
background:#003366;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

/* MOBILE */
@media(max-width:768px){
.hero h1{font-size:20px}
.features{grid-template-columns:1fr}
}
</style>
</head>

<body>

<header>
<h2>MGK JEE Study Hub</h2>
<nav>
<a href="index.html">Home</a>
<a href="physics.html">Notes</a>
<a href="#" onclick="openPortal()">Test</a>
<a href="leaderboard.html">Leaderboard</a>
</nav>
</header>

<section class="hero">
<h1>Master the JEE with MGK 🚀</h1>
<p>Free Notes | Tests | AI Doubt Solver</p>
<button onclick="openPortal()" class="btn">🔥 Start Test</button>
</section>

<!-- SEARCH -->
<div class="search-box">
<input type="text" id="search" placeholder="Search Chapter...">
</div>

<section class="features">
<a href="physics.html"><div class="feature-card">📘 Physics Notes</div></a>
<a href="chemistry.html"><div class="feature-card">🧪 Chemistry Notes</div></a>
<a href="maths.html"><div class="feature-card">📗 Maths Notes</div></a>
<div class="feature-card" onclick="openPortal()">📝 Mock Tests</div>
<a href="leaderboard.html"><div class="feature-card">🏆 Leaderboard</div></a>
<div class="feature-card">🤖 AI Doubt Solver</div>
</section>

<!-- TEST PORTAL -->
<div id="testPortal">
<div class="portal-header">
<h3>JEE TEST</h3>
<button onclick="closePortal()">X</button>
</div>

<div style="padding:20px;text-align:center;">
<h2>Start Your Test</h2>

<a href="https://docs.google.com/forms/d/e/1FAIpQLSdhy3vlUzFU8MdchRVvPTIUXaijGUpUTinw37_DTkOTgJ2aGA/viewform?usp=publish-editor"
target="_blank" class="btn">Start Test</a>

</div>
</div>

<!-- LIKE BUTTON -->
<div style="text-align:center;margin:20px;">
<button onclick="like()">👍 Like (<span id="likes">0</span>)</button>
</div>

<footer>
<p>© 2026 MGK JEE Study Hub 🚀</p>
</footer>

<script>
// LIKE
let count=0;
function like(){
count++;
document.getElementById("likes").innerText=count;
}

// SEARCH
document.getElementById("search").addEventListener("keyup", function(){
let val=this.value.toLowerCase();
document.querySelectorAll(".feature-card").forEach(card=>{
card.parentElement.style.display=
card.innerText.toLowerCase().includes(val)?"block":"none";
});
});

// TEST PORTAL
function openPortal(){document.getElementById("testPortal").style.display="block";}
function closePortal(){document.getElementById("testPortal").style.display="none";}
</script>

</body>
</html>
