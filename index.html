<!-- CHAT BUTTON -->
<button onclick="toggleChat()" style="position:fixed; bottom:20px; right:20px;">💬</button>

<!-- CHATBOX -->
<div id="chatbox" style="display:none; position:fixed; bottom:70px; right:20px; width:300px; background:white; color:black; padding:10px; border-radius:10px;">

    <h3>MGK AI</h3>

    <div id="chatArea" style="height:200px; overflow:auto; border:1px solid gray; padding:5px;"></div>

    <input type="text" id="userInput" placeholder="Ask doubt..." style="width:70%;">
    <button onclick="reply()">Send</button>

</div>

<script>
function toggleChat() {
    let box = document.getElementById("chatbox");
    if (box.style.display === "none") {
        box.style.display = "block";
    } else {
        box.style.display = "none";
    }
}

function reply() {
    let input = document.getElementById("userInput").value;
    let chat = document.getElementById("chatArea");

    if (input === "") return;

    chat.innerHTML += "<p><b>You:</b> " + input + "</p>";

    let text = input.toLowerCase();
    let ans = "";
    // 🧠 QUADRATIC EQUATION SOLVER (ax² + bx + c = 0)
else if (text.includes("solve") && text.includes("x2")) {

    let eq = input.replace(/\s/g, "").replace("x2", "x^2");

    // example: 2x^2+3x+1=0
    let match = eq.match(/([\-]?\d*)x\^2([\+\-]\d*)x([\+\-]\d+)=0/);

    if (match) {
        let a = match[1] === "" ? 1 : parseFloat(match[1]);
        let b = match[2] === "+" ? 1 : match[2] === "-" ? -1 : parseFloat(match[2]);
        let c = parseFloat(match[3]);

        let D = b*b - 4*a*c;

        if (D > 0) {
            let x1 = (-b + Math.sqrt(D)) / (2*a);
            let x2 = (-b - Math.sqrt(D)) / (2*a);

            ans = "Equation: " + eq + "<br>" +
                  "D = " + D + "<br>" +
                  "x₁ = " + x1 + ", x₂ = " + x2;
        }
        else if (D === 0) {
            let x = -b / (2*a);
            ans = "D = 0 → Equal roots<br>x = " + x;
        }
        else {
            ans = "D < 0 → No real roots";
        }
    } else {
        ans = "Try: solve 2x2+3x+1=0";
    }
}
    // 🧮 LINEAR EQUATION SOLVER (ax + b = 0)
else if (text.includes("solve")) {

    let eq = input.replace(/\s/g, ""); // space हटाओ

    // example: 2x+4=0
    let match = eq.match(/([\-]?\d*)x([\+\-]\d+)=0/);

    if (match) {
        let a = match[1] === "" ? 1 : parseFloat(match[1]);
        let b = parseFloat(match[2]);

        let x = -b / a;

        ans = "Solving: " + eq + "<br>" +
              "x = " + (-b) + "/" + a + "<br>" +
              "x = " + x;
    } else {
        ans = "Try format: solve 2x+4=0";
    }
}
    // AUTO NUMBER DETECT
let numbers = input.match(/\d+/g);

// 🔵 VELOCITY
if (text.includes("velocity") && numbers && numbers.length >= 2) {
    let d = parseFloat(numbers[0]);
    let t = parseFloat(numbers[1]);
    let v = d / t;

    ans = "Given: distance = " + d + "m, time = " + t + "s <br>" +
          "Velocity = d/t = " + d + "/" + t + " = " + v + " m/s";
}

// 🔴 FORCE
else if (text.includes("force") && numbers && numbers.length >= 2) {
    let m = parseFloat(numbers[0]);
    let a = parseFloat(numbers[1]);
    let F = m * a;

    ans = "Given: mass = " + m + "kg, acceleration = " + a + "m/s² <br>" +
          "Force = m × a = " + m + " × " + a + " = " + F + " N";
}

// 🟢 WORK
else if (text.includes("work") && numbers && numbers.length >= 2) {
    let F = parseFloat(numbers[0]);
    let s = parseFloat(numbers[1]);
    let W = F * s;

    ans = "Given: force = " + F + "N, displacement = " + s + "m <br>" +
          "Work = F × s = " + F + " × " + s + " = " + W + " Joule";
}

// 🟣 KINETIC ENERGY
else if (text.includes("kinetic") && numbers && numbers.length >= 2) {
    let m = parseFloat(numbers[0]);
    let v = parseFloat(numbers[1]);
    let KE = 0.5 * m * v * v;

    ans = "Given: mass = " + m + "kg, velocity = " + v + "m/s <br>" +
          "K.E = ½mv² = 0.5 × " + m + " × " + v + "² = " + KE + " Joule";
}

// 🟡 DEFAULT
else {
    ans = "Ask like: velocity 10m 2s, force 5kg 2m/s2, work 10N 5m";
}
    // AUTO NUMBER DETECT (ADVANCED AI)
let numbers = input.match(/\d+/g);

if (text.includes("velocity") && numbers && numbers.length >= 2) {
    let d = parseFloat(numbers[0]);
    let t = parseFloat(numbers[1]);

    let v = d / t;

    ans = "Given: distance = " + d + "m, time = " + t + "s <br>" +
          "Velocity = distance/time <br>" +
          "= " + d + "/" + t + " = " + v + " m/s";
}
// NUMERICAL SOLVER
if (text.includes("velocity") && text.includes("10") && text.includes("2")) {
    ans = "Given: distance = 10m, time = 2s <br> Velocity = distance/time = 10/2 = 5 m/s";
}
    if (text.includes("velocity")) {
        ans = "Velocity = displacement/time with direction.";
    }
    else if (text.includes("force")) {
        ans = "Force = mass × acceleration (F = ma)";
    }
    else if (text.includes("work")) {
        ans = "Work = F × s (force × displacement)";
    }
    else if (text.includes("energy")) {
        ans = "Energy is capacity to do work.";
    }
    else if (text.includes("current")) {
        ans = "Current = charge/time (I = Q/t)";
    }
    else {
        ans = "Try asking about velocity, force, work, energy, current.";
    }

    chat.innerHTML += "<p><b>MGK AI:</b> " + ans + "</p>";

    document.getElementById("userInput").value = "";
    chat.scrollTop = chat.scrollHeight;
}
</script>
