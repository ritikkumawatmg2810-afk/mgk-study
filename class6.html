<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MGK Class 6 | Official NCERT Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6; --neon: #00f2fe; --border: rgba(255, 255, 255, 0.1);
            --book: #00e676; --notes: #ff9100;
        }

        body {
            margin: 0; font-family: 'Outfit', sans-serif; background: #020617; color: #fff;
            background-image: radial-gradient(circle at 10% 10%, rgba(139, 92, 246, 0.1) 0%, transparent 40%),
                              radial-gradient(circle at 90% 90%, rgba(0, 242, 254, 0.05) 0%, transparent 40%);
            background-attachment: fixed; min-height: 100vh; overflow-x: hidden;
        }

        header {
            position: sticky; top: 0; z-index: 2000; background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 15px; text-align: center;
        }

        .lang-toggle {
            display: flex; justify-content: center; gap: 5px; background: rgba(255,255,255,0.05);
            width: fit-content; margin: 0 auto 15px; padding: 5px; border-radius: 50px; border: 1px solid var(--border);
        }
        .lang-btn {
            padding: 8px 20px; border-radius: 50px; border: none; background: transparent;
            color: #94a3b8; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 11px;
        }
        .lang-btn.active { background: var(--primary); color: white; box-shadow: 0 0 15px rgba(139, 92, 246, 0.5); }

        .logo { font-size: 1.8rem; font-weight: 900; background: linear-gradient(to right, #fff, var(--primary), var(--neon)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }

        .sub-nav { display: flex; overflow-x: auto; gap: 8px; padding: 10px; scrollbar-width: none; border-top: 1px solid var(--border); }
        .sub-nav::-webkit-scrollbar { display: none; }

        .btn-sub { flex: 0 0 auto; padding: 10px 22px; border-radius: 50px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #94a3b8; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 12px; }
        .btn-sub.active { background: #fff; color: #000; }

        .portal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 25px; padding: 25px; max-width: 1500px; margin: auto; }

        .card { background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 35px; padding: 25px; display: none; border-top: 3px solid var(--primary); }
        .card.active { display: block; animation: fadeInUp 0.4s ease forwards; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .option-tabs { display: grid; grid-template-columns: 1fr 1fr; background: rgba(0,0,0,0.4); padding: 5px; border-radius: 20px; margin: 20px 0; gap: 5px; }
        .opt-btn { border: none; background: transparent; color: #64748b; padding: 12px; border-radius: 16px; font-weight: 900; font-size: 12px; cursor: pointer; }
        .opt-btn.book-on { background: var(--book); color: #000; }
        .opt-btn.notes-on { background: var(--notes); color: #000; }

        .vault { background: rgba(0,0,0,0.25); border-radius: 25px; padding: 12px; max-height: 350px; overflow-y: auto; }
        .pdf-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 15px 20px; border-radius: 20px; margin-bottom: 10px; text-decoration: none; color: #cbd5e1; font-size: 14px; font-weight: 600; border: 1px solid transparent; }
        .pdf-item:hover { border-color: var(--primary); color: #fff; background: rgba(255,255,255,0.08); }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="lang-toggle">
            <button class="lang-btn active" id="enBtn" onclick="setLang('en')">English Medium</button>
            <button class="lang-btn" id="hiBtn" onclick="setLang('hi')">हिंदी माध्यम</button>
        </div>
        <div class="logo">MGK CLASS 6 PORTAL</div>
        <div class="sub-nav" id="subjectNav"></div>
    </header>

    <div class="portal-grid" id="mainGrid"></div>

    <script>
        let currentLang = 'en';
        let currentSub = 'Maths';

        const UI = {
            en: { book: "📖 BOOK PDF", notes: "📝 STUDY NOTES", unit: "Unit", open: "VIEW" },
            hi: { book: "📖 किताब PDF", notes: "📝 नोट्स", unit: "इकाई", open: "देखें" }
        };

        const DB = {
            "Maths": {
                en: ["Knowing Our Numbers", "Whole Numbers", "Playing with Numbers", "Basic Geometrical Ideas", "Understanding Elementary Shapes", "Integers", "Fractions", "Decimals", "Data Handling", "Mensuration", "Algebra", "Ratio and Proportion"],
                hi: ["अपनी संख्याओं की जानकारी", "पूर्ण संख्याएँ", "संख्याओं के साथ खेलना", "आधारभूत ज्यामितीय अवधारणाएँ", "प्रारंभिक आकारों को समझना", "पूर्णांक", "भिन्न", "दशमलव", "आँकड़ों का प्रबंधन", "क्षेत्रमिति", "बीजगणित", "अनुपात और समानुपात"],
                links: Array(12).fill(["#book", "#notes"])
            },
            "Science": {
                en: ["Components of Food", "Sorting Materials into Groups", "Separation of Substances", "Getting to Know Plants", "Body Movements", "The Living Organisms", "Motion and Measurement of Distances", "Light, Shadows and Reflections", "Electricity and Circuits", "Fun with Magnets", "Air Around Us"],
                hi: ["भोजन के घटक", "वस्तुओं के समूह बनाना", "पदार्थों का पृथक्करण", "पौधों को जानिए", "शरीर में गति", "सजीव एवं उनका परिवेश", "गति एवं दूरियों का मापन", "प्रकाश - छायाएँ एवं परावर्तन", "विधुत तथा परिपथ", "चुंबकों द्वारा मनोरंजन", "हमारे चारों ओर वायु"],
                links: Array(11).fill(["#book", "#notes"])
            },
            "History": {
                en: ["What, Where, How and When?", "From Hunting-Gathering to Growing Food", "In the Earliest Cities", "What Books and Burials Tell Us", "Kingdoms, Kings and an Early Republic", "New Questions and Ideas", "Ashoka, The Emperor Who Gave Up War", "Vital Villages, Thriving Towns"],
                hi: ["क्या, कहाँ, कैसे और कब?", "आखेट-खाद्य संग्रह से भोजन उत्पादन तक", "आरंभिक नगर", "क्या बताती हैं हमें किताबें और कब्रें", "राज्य, राजा और एक प्राचीन गणराज्य", "नये प्रश्न नये विचार", "अशोक: एक अनोखा सम्राट जिसने युद्ध का त्याग किया", "खुशहाल गाँव और समृद्ध शहर"],
                links: Array(8).fill(["#book", "#notes"])
            },
            "Geography": {
                en: ["The Earth in the Solar System", "Globe: Latitudes and Longitudes", "Motions of the Earth", "Maps", "Major Domains of the Earth", "Our Country: India"],
                hi: ["सौरमंडल में पृथ्वी", "ग्लोब: अक्षांश एवं देशांतर", "पृथ्वी की गतियाँ", "मानचित्र", "पृथ्वी के प्रमुख परिमंडल", "हमारा देश: भारत"],
                links: Array(6).fill(["#book", "#notes"])
            },
            "Civics": {
                en: ["Understanding Diversity", "Diversity and Discrimination", "What is Government?", "Key Elements of a Democratic Government", "Panchayati Raj", "Rural Administration", "Urban Administration", "Rural Livelihoods", "Urban Livelihoods"],
                hi: ["विविधता की समझ", "विविधता एवं भेदभाव", "सरकार क्या है?", "लोकतांत्रिक सरकार के मुख्य तत्व", "पंचायती राज", "ग्रामीण प्रशासन", "नगर प्रशासन", "ग्रामीण क्षेत्र में आजीविका", "शहरी क्षेत्र में आजीविका"],
                links: Array(9).fill(["#book", "#notes"])
            },
            "English": {
                en: ["Who Did Patrick's Homework?", "How the Dog Found Himself a New Master!", "Taro's Reward", "An Indian-American Woman in Space: Kalpana Chawla", "A Different Kind of School", "Who I Am", "Fair Play", "A Game of Chance", "Desert Animals", "The Banyan Tree"],
                hi: ["पैट्रिक का होमवर्क किसने किया?", "कुत्ते को नया मालिक कैसे मिला!", "तारो का इनाम", "अंतरिक्ष में भारतीय-अमेरिकी महिला", "एक अलग तरह का स्कूल", "मैं कौन हूँ", "उचित खेल", "भाग्य का खेल", "रेगिस्तानी जानवर", "बरगद का पेड़"],
                links: Array(10).fill(["#book", "#notes"])
            }
        };

        function setLang(l) {
            currentLang = l;
            document.getElementById('enBtn').className = l === 'en' ? 'lang-btn active' : 'lang-btn';
            document.getElementById('hiBtn').className = l === 'hi' ? 'lang-btn active' : 'lang-btn';
            renderNav();
            renderGrid();
        }

        function renderNav() {
            const nav = document.getElementById('subjectNav');
            nav.innerHTML = '';
            const subsEn = Object.keys(DB);
            const subsHi = ["गणित", "विज्ञान", "इतिहास", "भूगोल", "नागरिक शास्त्र", "अंग्रेजी"];
            
            subsEn.forEach((s, i) => {
                const btn = document.createElement('button');
                btn.className = `btn-sub ${s === currentSub ? 'active' : ''}`;
                btn.innerText = currentLang === 'en' ? s : subsHi[i];
                btn.onclick = () => { currentSub = s; renderNav(); renderGrid(); };
                nav.appendChild(btn);
            });
        }

        function renderGrid() {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            const chapters = DB[currentSub][currentLang];
            const links = DB[currentSub].links;

            chapters.forEach((ch, i) => {
                const id = `vault-${i}`;
                const cardLinks = links[i] || ["#", "#"];
                const card = document.createElement('div');
                card.className = 'card active';
                card.innerHTML = `
                    <h3 style="margin:0; font-size:1.1rem; color:var(--neon); min-height:45px;">${ch}</h3>
                    <div class="option-tabs">
                        <button class="opt-btn book-on" onclick="updateV('${id}', '${cardLinks[0]}', this, 'book')">${UI[currentLang].book}</button>
                        <button class="opt-btn" onclick="updateV('${id}', '${cardLinks[1]}', this, 'notes')">${UI[currentLang].notes}</button>
                    </div>
                    <div class="vault" id="${id}">${genSlots(cardLinks[0], UI[currentLang].book)}</div>
                `;
                grid.appendChild(card);
            });
        }

        function genSlots(url, typeName) {
            let h = '';
            for(let i=1; i<=26; i++) {
                h += `<a href="${url}" target="_blank" class="pdf-item">
                        <span>📄 ${typeName} - ${UI[currentLang].unit} ${i}</span>
                        <span style="color:var(--neon); font-size:11px;">${UI[currentLang].open} →</span>
                      </a>`;
            }
            return h;
        }

        function updateV(id, url, btn, type) {
            const row = btn.parentElement.querySelectorAll('.opt-btn');
            row.forEach(b => b.className = 'opt-btn');
            btn.classList.add(type === 'book' ? 'book-on' : 'notes-on');
            document.getElementById(id).innerHTML = genSlots(url, btn.innerText);
        }

        setLang('en');
    </script>
</body>
</html>
