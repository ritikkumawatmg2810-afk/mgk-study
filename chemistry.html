<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chemistry Study Hub - MGK JEE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            background-image: radial-gradient(circle at 10% 20%, rgba(255, 182, 193, 0.2) 0%, transparent 20%),
                              url('https://www.transparenttextures.com/patterns/floral-paper.png');
            color: #333; min-height: 100vh;
        }

        h1 { text-align: center; padding: 30px 15px; font-weight: 800; color: #d81b60; font-size: 1.6rem; text-transform: uppercase; }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px; padding: 15px; max-width: 1400px; margin: auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.98); border-radius: 22px;
            border: 2px solid #fce4ec; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; overflow: hidden;
        }

        .card-header { background: linear-gradient(135deg, #f06292, #ba68c8); padding: 18px; text-align: center; color: white; }
        .ch-name { font-size: 19px; font-weight: 800; margin: 0; text-transform: uppercase; }

        .card-body { padding: 15px; }
        .section-frame { background: #fffafa; border: 1px solid #f8bbd0; border-radius: 14px; padding: 12px; margin-bottom: 15px; }
        .section-label { font-size: 11px; font-weight: 800; color: #ad1457; text-transform: uppercase; margin-bottom: 10px; display: block; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-grid a {
            text-decoration: none; color: #444; background: #ffffff; padding: 14px 5px;
            border-radius: 10px; font-size: 12px; text-align: center; border: 1px solid #eeeeee; font-weight: 600;
        }
        .btn-grid a:active { background: #f06292; color: white; }

        .pyq-row { display: flex; gap: 10px; }
        select { flex: 1; background: #ffffff; border: 1.5px solid #f8bbd0; padding: 12px; border-radius: 10px; font-size: 14px; outline: none; }

        .back-home { display: block; text-align: center; margin: 30px auto; color: #d81b60; text-decoration: none; font-weight: 800; padding: 15px; border: 2px solid #d81b60; border-radius: 50px; max-width: 200px; }

        @media screen and (max-width: 480px) {
            .container { grid-template-columns: 1fr; padding: 10px; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <h1>🧪 Chemistry Resource Portal</h1>
    <div class="container" id="chem-list"></div>
    <a href="index.html" class="back-home">⬅ Back to Home</a>

    <script>
        // SARE DRIVE LINKS WAPAS AA GAYE HAIN
        const chemData = [
            { name: "Atomic Structure", sn: "https://drive.google.com/file/d/1TDHrhvw6Z54f6fDiYoNRY0DNdlI-bVuS/preview", fn: "#", mm: "#", ft: "#", e: "#", m: "#", t: "#", msc: "#", na: "#", vkj: "#", jdl: "#" },
            { name: "Mole Concept", sn: "https://drive.google.com/file/d/1F8llwTGkfue7HZqBA_ZWGyZRu0cOA4K2/preview", fn: "#", mm: "#", ft: "#", e: "#", m: "#", t: "#", msc: "#", na: "#", vkj: "#", jdl: "#" },
            { name: "Periodic Table", sn: "https://drive.google.com/file/d/1F7PGoq93WtegPen25cMLDpUqxfHDvZFd/preview", fn: "#", mm: "#", ft: "#", e: "#", m: "#", t: "#", msc: "#", na: "#", vkj: "#", jdl: "#" },
            { name: "Chemical Bonding", sn: "https://drive.google.com/file/d/1qOm9H_O9_TySMjLrMM8OLnlw76BRb5Z4/preview", fn: "#", mm: "#", ft: "#", e: "#", m: "#", t: "#", msc: "#", na: "#", vkj: "#", jdl: "#" },
            { name: "Redox Reaction", sn: "https://drive.google.com/file/d/1HZj3oLZTnlW76H_C40V_pajEa1ARK0px/preview", fn: "#", mm: "#", ft: "#", e: "#", m: "#", t: "#", msc: "#", na: "#", vkj: "#", jdl: "#" },
            { name: "General Organic Chemistry", sn: "https://drive.google.com/file/d/1egeVKA6bUNFLFeoH0vU0UXy4_MQMsvvi/preview", fn: "#", mm: "#", ft: "#", e: "#", m: "#", t: "#", msc: "#", na: "#", vkj: "#", jdl: "#" },
            { name: "IUPAC Nomenclature", sn: "https://drive.google.com/file/d/1fFCMoX35A5wHnTlcUz9GSzhk-4Z85h1A/preview", fn: "#", mm: "#", ft: "#", e: "#", m: "#", t: "#", msc: "#", na: "#", vkj: "#", jdl: "#" },
            { name: "Isomerism", sn: "https://drive.google.com/file/d/1VmKfekSXdHnOgiU-0viBIRBShzEkckLA/preview", fn: "#", mm: "#", ft: "#", e: "#", m: "#", t: "#", msc: "#", na: "#", vkj: "#", jdl: "#" },
            { name: "States of Matter", sn: "#", fn: "#", mm: "#", ft: "#", e: "#", m: "#", t: "#", msc: "#", na: "#", vkj: "#", jdl: "#" },
            { name: "Solutions", sn: "#", fn: "#", mm: "#", ft: "#", e: "#", m: "#", t: "#", msc: "#", na: "#", vkj: "#", jdl: "#" },
            { name: "Electrochemistry", sn: "#", fn: "#", mm: "#", ft: "#", e: "#", m: "#", t: "#", msc: "#", na: "#", vkj: "#", jdl: "#" },
            { name: "Chemical Kinetics", sn: "#", fn: "#", mm: "#", ft: "#", e: "#", m: "#", t: "#", msc: "#", na: "#", vkj: "#", jdl: "#" },
            { name: "Surface Chemistry", sn: "#", fn: "#", mm: "#", ft: "#", e: "#", m: "#", t: "#", msc: "#", na: "#", vkj: "#", jdl: "#" },
            { name: "Hydrocarbons", sn: "#", fn: "#", mm: "#", ft: "#", e: "#", m: "#", t: "#", msc: "#", na: "#", vkj: "#", jdl: "#" },
            { name: "Alcohols & Phenols", sn: "#", fn: "#", mm: "#", ft: "#", e: "#", m: "#", t: "#", msc: "#", na: "#", vkj: "#", jdl: "#" },
            { name: "Aldehydes & Ketones", sn: "#", fn: "#", mm: "#", ft: "#", e: "#", m: "#", t: "#", msc: "#", na: "#", vkj: "#", jdl: "#" },
            { name: "Amines", sn: "#", fn: "#", mm: "#", ft: "#", e: "#", m: "#", t: "#", msc: "#", na: "#", vkj: "#", jdl: "#" },
            { name: "Biomolecules", sn: "#", fn: "#", mm: "#", ft: "#", e: "#", m: "#", t: "#", msc: "#", na: "#", vkj: "#", jdl: "#" },
            { name: "Polymers", sn: "#", fn: "#", mm: "#", ft: "#", e: "#", m: "#", t: "#", msc: "#", na: "#", vkj: "#", jdl: "#" }
        ];

        const container = document.getElementById('chem-list');
        chemData.forEach(ch => {
            let years = "";
            for (let y = 2026; y >= 2015; y--) {
                years += `<option value="paper-${ch.name}-${y}.html">${y} Paper</option>`;
            }
            container.innerHTML += `
            <div class="card">
                <div class="card-header"><h2 class="ch-name">${ch.name}</h2></div>
                <div class="card-body">
                    <div class="section-frame"><span class="section-label">📚 Lectures & Notes</span>
                        <div class="btn-grid"><a href="${ch.sn}" target="_blank">Short Notes</a><a href="${ch.fn}" target="_blank">Full Notes</a><a href="${ch.mm}" target="_blank">Mind Maps</a><a href="${ch.ft}" target="_blank">Finger Tips</a></div>
                    </div>
                    <div class="section-frame"><span class="section-label">✍️ Practice (Level Wise)</span>
                        <div class="btn-grid"><a href="${ch.e}" target="_blank">Easy</a><a href="${ch.m}" target="_blank">Medium</a><a href="${ch.t}" target="_blank">Tough</a></div>
                    </div>
                    <div class="section-frame"><span class="section-label">📖 Best Chem Books</span>
                        <div class="btn-grid"><a href="${ch.msc}" target="_blank">MS Chauhan</a><a href="${ch.na}" target="_blank">N Awasthi</a><a href="${ch.vkj}" target="_blank">VK Jaiswal</a><a href="${ch.jdl}" target="_blank">JD Lee</a></div>
                    </div>
                    <div class="section-frame"><span class="section-label">🎯 PYQ Archives</span>
                        <div class="pyq-row"><select onchange="if(this.value) window.open(this.value)"><option value="">Mains</option>${years}</select><select onchange="if(this.value) window.open(this.value)"><option value="">Adv</option>${years}</select></div>
                    </div>
                </div>
            </div>`;
        });
    </script>
</body>
</html>
