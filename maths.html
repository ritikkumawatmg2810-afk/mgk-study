<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maths Resource Portal - Final Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Inter', Arial, sans-serif; background-color: #ffffff; background-image: radial-gradient(circle at 10% 20%, rgba(255, 182, 193, 0.2) 0%, transparent 20%), radial-gradient(circle at 90% 80%, rgba(173, 216, 230, 0.2) 0%, transparent 20%), url('https://www.transparenttextures.com/patterns/floral-paper.png'); color: #333; min-height: 100vh; }
        h1 { text-align: center; padding: 30px 15px; font-weight: 800; text-transform: uppercase; color: #d81b60; font-size: 1.6rem; letter-spacing: 1px; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; padding: 15px; max-width: 1600px; margin: auto; }
        .card { background: rgba(255, 255, 255, 0.98); border-radius: 22px; border: 2px solid #fce4ec; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.06); display: flex; flex-direction: column; }
        .card-header { background: linear-gradient(135deg, #f06292, #ba68c8); padding: 18px; text-align: center; color: white; }
        .ch-name { font-size: 18px; font-weight: 800; margin: 0; text-transform: uppercase; }
        .card-body { padding: 15px; }
        .section-frame { background: #fffafa; border: 1px solid #f8bbd0; border-radius: 14px; padding: 12px; margin-bottom: 15px; }
        .section-label { font-size: 11px; font-weight: 800; color: #ad1457; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-grid a { text-decoration: none; color: #444; background: #ffffff; padding: 14px 5px; border-radius: 10px; font-size: 12px; text-align: center; border: 1px solid #eeeeee; font-weight: 600; display: flex; align-items: center; justify-content: center; }
        .lec-stack { display: flex; flex-direction: column; gap: 8px; }
        .lec-item { display: flex; gap: 5px; align-items: center; }
        .lec-item a { flex: 1; text-decoration: none; color: #444; background: #ffffff; padding: 10px; border-radius: 8px; font-size: 11px; border: 1px solid #eee; font-weight: 600; text-align: center; }
        .lec-item a.pdf-btn { background: #fff0f5; color: #d81b60; border-color: #f8bbd0; }
        .pyq-row { display: flex; gap: 10px; }
        select { flex: 1; background: #ffffff; border: 1.5px solid #f8bbd0; padding: 12px; border-radius: 10px; font-size: 14px; outline: none; }
        .back-home { display: block; text-align: center; margin: 20px auto; color: #d81b60; text-decoration: none; font-weight: 800; padding: 15px; border: 2px solid #d81b60; border-radius: 50px; max-width: 200px; }
    </style>
</head>
<body>

    <h1>📐 Maths Resource Portal</h1>

    <a href="index.html" class="back-home">⬅ Back to Home</a>

        const container = document.getElementById('maths-list');
        mathsData.forEach(ch => {
            let years = "";
            for (let y = 2026; y >= 2015; y--) { years += `<option value="paper-${ch.name}-${y}.html">${y} Paper</option>`; }
            let pdfList = "";
            for (let i = 1; i <= 26; i++) {
                pdfList += `<div class="lec-item"><a href="${ch.pdfs[i-1]}" class="pdf-btn" target="_blank">📄 PDF Unit ${i}</a></div>`;
            }
            container.innerHTML += `
            <div class="card">
                <div class="card-header"><h2 class="ch-name">${ch.name}</h2></div>
                <div class="card-body">
                    <div class="section-frame"><span class="section-label">📚 Resources</span><div class="btn-grid"><a href="${ch.sn}" target="_blank">Short Notes</a><a href="${ch.fn}" target="_blank">Full Notes</a><a href="${ch.mm}" target="_blank">Mind Maps</a><a href="${ch.ft}" target="_blank">Formulae</a></div></div>

</body>
</html>
