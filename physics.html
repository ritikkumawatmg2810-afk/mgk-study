<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Physics Study Portal - Floral Resources</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', Arial, sans-serif;
            background-color: #ffffff;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 182, 193, 0.2) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(173, 216, 230, 0.2) 0%, transparent 20%),
                url('https://www.transparenttextures.com/patterns/floral-paper.png');
            color: #333;
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            padding: 30px 15px;
            font-weight: 800;
            text-transform: uppercase;
            color: #d81b60;
            font-size: 1.6rem;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            padding: 15px;
            max-width: 1600px;
            margin: auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(5px);
            border-radius: 22px;
            border: 2px solid #fce4ec;
            overflow: hidden;
            transition: 0.3s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(216, 27, 96, 0.15);
            border-color: #f06292;
        }

        .card-header {
            background: linear-gradient(135deg, #f06292, #ba68c8);
            padding: 18px;
            text-align: center;
            color: white;
        }

        .ch-name {
            font-size: 18px;
            font-weight: 800;
            margin: 0;
            text-transform: uppercase;
        }

        .card-body {
            padding: 15px;
        }

        .section-frame {
            background: #fffafa;
            border: 1px solid #f8bbd0;
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 15px;
        }

        .section-label {
            font-size: 11px;
            font-weight: 800;
            color: #ad1457;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-grid a {
            text-decoration: none;
            color: #444;
            background: #ffffff;
            padding: 12px 5px;
            border-radius: 10px;
            font-size: 12px;
            text-align: center;
            border: 1px solid #eeeeee;
            transition: 0.2s;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-grid a:active {
            background: #f06292;
            color: white;
        }

        .easy:hover { border-bottom: 3px solid #66bb6a !important; }
        .medium:hover { border-bottom: 3px solid #ffa726 !important; }
        .tough:hover { border-bottom: 3px solid #ef5350 !important; }

        .pyq-row {
            display: flex;
            gap: 10px;
        }

        select {
            flex: 1;
            background: #ffffff;
            color: #333;
            border: 1.5px solid #f8bbd0;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
        }

        .card::after {
            content: '🌸';
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 20px;
            opacity: 0.2;
        }

        @media screen and (max-width: 480px) {
            .container { grid-template-columns: 1fr; padding: 10px; }
            h1 { font-size: 1.4rem; }
            .btn-grid a { padding: 14px 5px; font-size: 13px; }
        }
    </style>
</head>

<body>

    <h1>🌸 Physics Chapters Resource 🌸</h1>

    <div class="container" id="chapter-list"></div>

    <script>
        // DATA: Zero Cutting - All 26 chapters preserved with Physics Books

            { name: "Rotational Motion", sn: "#", fn: "#", mm: "#", ft: "#", e: "#", m: "#", t: "#", hcv: "#", iro: "#", dcp: "#", cng: "#" },

            { name: "Alternating Current", sn: "#", fn: "#", mm: "#", ft: "#", e: "#", m: "#", t: "#", hcv: "#", iro: "#", dcp: "#", cng: "#" },
            { name: "Electromagnetic Waves", sn: "#", fn: "#", mm: "#", ft: "#", e: "#", m: "#", t: "#", hcv: "#", iro: "#", dcp: "#", cng: "#" },

            { name: "Units & Dimensions", sn: "#", fn: "#", mm: "#", ft: "#", e: "#", m: "#", t: "#", hcv: "#", iro: "#", dcp: "#", cng: "#" },
            { name: "Errors & Measurements", sn: "#", fn: "#", mm: "#", ft: "#", e: "#", m: "#", t: "#", hcv: "#", iro: "#", dcp: "#", cng: "#" },

        const container = document.getElementById('chapter-list');

        physicsData.forEach(ch => {
            let years = "";
            for (let y = 2026; y >= 2015; y--) {
                years += `<option value="paper-${ch.name}-${y}.html">${y} Paper</option>`;
            }

            const card = `
            <div class="card">

                        <div class="pyq-row">
                            <select onchange="if(this.value) window.open(this.value)"><option value="">JEE Mains</option>${years}</select>

            container.innerHTML += card;

    </script>

    <script src="https://utteranc.es/client.js"
            repo="ritikkumawatmg2810-afk/mgk-study"

</body>
</html>
